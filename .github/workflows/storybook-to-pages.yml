name: Deploy Docs Site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_storybook:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE: "/${{ github.event.repository.name }}"
      STORYBOOK_BASE_PATH: "/${{ github.event.repository.name }}/storybook"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Set up GitHub Actions caching for Turborepo
        uses: dtinth/setup-github-actions-caching-for-turbo@v1.3.0
      - name: Install dependencies
        run: bun install
      - name: Build packages
        run: bun run build:packages
      - name: Build Storybook
        run: bun run --cwd ./apps/storybook build:pages
      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-storybook
          path: ./_site/storybook

  build_typedoc:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE: "/${{ github.event.repository.name }}"
      TYPEDOC_BASE_PATH: "/${{ github.event.repository.name }}/typedoc"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Set up GitHub Actions caching for Turborepo
        uses: dtinth/setup-github-actions-caching-for-turbo@v1.3.0
      - name: Install dependencies
        run: bun install
      - name: Build packages
        run: bun run build:packages
      - name: Build TypeDoc
        run: bun run docs:pages
      - name: Upload TypeDoc artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-typedoc
          path: ./_site/typedoc

  build_testapp:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE: "/${{ github.event.repository.name }}"
      TESTAPP_BASE_PATH: "/${{ github.event.repository.name }}/testapp/"
      VITE_BASE_PATH: "/${{ github.event.repository.name }}/testapp/"
      VITE_PUBLIC_BASE_PATH: "/${{ github.event.repository.name }}/testapp"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Set up GitHub Actions caching for Turborepo
        uses: dtinth/setup-github-actions-caching-for-turbo@v1.3.0
      - name: Install dependencies
        run: bun install
      - name: Build packages
        run: bun run build:packages
      - name: Build testapp
        run: bun run --cwd ./apps/testapp build:pages
      - name: Upload testapp artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-testapp
          path: ./_site/testapp

  assemble:
    runs-on: ubuntu-latest
    needs:
      - build_storybook
      - build_typedoc
      - build_testapp
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Download Storybook artifact
        uses: actions/download-artifact@v5
        with:
          name: site-storybook
          path: ./_site/storybook
      - name: Download TypeDoc artifact
        uses: actions/download-artifact@v5
        with:
          name: site-typedoc
          path: ./_site/typedoc
      - name: Download testapp artifact
        uses: actions/download-artifact@v5
        with:
          name: site-testapp
          path: ./_site/testapp
      - name: Add root landing page
        run: cp ./apps/storybook/public/pages-index.html ./_site/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: assemble
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
