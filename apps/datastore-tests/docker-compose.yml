# Docker services for datastore-tests.
# Start all: docker compose up -d --wait
# Then run:  OXIGRAPH_URL=http://localhost:7878 BLAZEGRAPH_URL=http://localhost:9999/bigdata \
#            FUSEKI_URL=http://localhost:3030/ds \
#            POSTGRES_URL=postgresql://test:test@localhost:5432/graviola_test \
#            MARIADB_URL=mysql://test:test@localhost:3307/graviola_test \
#            MONGODB_URL='mongodb://test:test@localhost:27017/graviola_test?authSource=admin&directConnection=true&replicaSet=rs0' \
#            bun test

services:

  # ─── SPARQL stores ──────────────────────────────────────────────────────────

  oxigraph:
    image: ghcr.io/oxigraph/oxigraph:latest
    platform: linux/amd64
    ports:
      - "7878:7878"
    command: serve --location /data --bind 0.0.0.0:7878
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:7878/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  blazegraph:
    image: lyrasis/blazegraph:2.1.5
    ports:
      - "9999:8080"
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "wget -q --spider http://localhost:8080/bigdata/ || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
    # Blazegraph can be slow to start; give it extra time
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # Apache Jena Fuseki + TDB2 (`ds`). Image supplies the server; `fuseki-assembler.ttl`
  # replaces the default SeCo assembler so the default graph is queryable without GRAPH {}
  # (their stock config sets tdb:unionDefaultGraph true, which hides default-graph triples).
  # SPARQL: http://localhost:3030/ds/sparql — Update: http://localhost:3030/ds/update
  fuseki:
    image: secoresearch/fuseki:5.5.0
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: test
    volumes:
      - fuseki_data:/fuseki-base/databases
      - ./fuseki-assembler.ttl:/fuseki-base/configuration/assembler.ttl:ro
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "wget -q --spider http://127.0.0.1:3030/$$/ping || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ─── Relational databases ───────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: graviola_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "test", "-d", "graviola_test"]
      interval: 3s
      timeout: 3s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: graviola_test
      MARIADB_USER: test
      MARIADB_PASSWORD: test
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    healthcheck:
      test:
        [
          "CMD",
          "healthcheck.sh",
          "--su-mysql",
          "--connect",
          "--innodb_initialized",
        ]
      interval: 3s
      timeout: 5s
      retries: 20
    volumes:
      - mariadb_data:/var/lib/mysql

  # ─── Document stores ────────────────────────────────────────────────────────
  # MongoDB for Prisma/Mongo tests: official image + single-node replica set `rs0`
  # (Prisma transactions require a replica set). Auth + replSet needs `--keyFile`.
  # The bind-mounted `mongo-keyfile` is copied to /tmp with owner mongodb (999) so
  # Mongo accepts permissions inside the container. Init runs in the healthcheck.

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: test
      MONGO_INITDB_ROOT_PASSWORD: test
      MONGO_INITDB_DATABASE: graviola_test
    ports:
      - "27017:27017"
    entrypoint:
      - bash
      - -c
      - |
        set -e
        cp /keyfile.in /tmp/mongo-rs-keyfile
        chown 999:999 /tmp/mongo-rs-keyfile
        chmod 400 /tmp/mongo-rs-keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /tmp/mongo-rs-keyfile
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "-u",
          "test",
          "-p",
          "test",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "try { rs.status(); } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '127.0.0.1:27017' }] }); } db.adminCommand('ping').ok",
        ]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 25s
    volumes:
      - mongodb_data:/data/db
      - ./mongo-keyfile:/keyfile.in:ro

volumes:
  fuseki_data:
  postgres_data:
  mariadb_data:
  mongodb_data:
